name: Architecture Sanitation Scan

on:
  push:
    branches:
      - main
      - 'feature/*'
      - 'fix/*'
  pull_request:

jobs:
  architect_scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      issues: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Need full history to compare last 5 commits

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Architecture Scan
        run: python3 scripts/architect_scan.py

      - name: Comment on PR
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f "issues/architect_pr_comment.md" ]; then
            # We are using github event name push per memory, and we need to use GITHUB_REF_NAME
            BRANCH_NAME=$GITHUB_REF_NAME
            PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number')
            if [ -n "$PR_NUMBER" ]; then
              gh pr comment "$PR_NUMBER" --body-file issues/architect_pr_comment.md
            else
              echo "No open PR found for branch $BRANCH_NAME"
            fi
          fi
