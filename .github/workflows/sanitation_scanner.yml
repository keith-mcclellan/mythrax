name: Sanitation Scanner

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 10 # Need history for trajectory

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Run Sanitation Scanner
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_ENV: true
      run: python3 scripts/sanitation_scanner.py
